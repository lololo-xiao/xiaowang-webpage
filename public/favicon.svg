<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- background -->
  <rect width="100" height="100" fill="#f5f3ef"/>
  <!-- eye outline -->
  <ellipse cx="50" cy="50" rx="40" ry="24" stroke="#111" stroke-width="3.5" fill="none"/>
  <!-- iris -->
  <circle cx="50" cy="50" r="13" stroke="#111" stroke-width="3" fill="none"/>
  <!-- pupil -->
  <circle cx="50" cy="50" r="5.5" fill="#111"/>
  <!-- lash strokes -->
  <line x1="14" y1="41" x2="7" y2="32" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="86" y1="41" x2="93" y2="32" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="26" x2="50" y2="17" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
</svg>
